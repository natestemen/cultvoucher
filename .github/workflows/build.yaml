name: Build and deploy CV

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  issue_voucher:
    runs-on: ubuntu-latest
    steps:
      - name: Checking out this voucher
        uses: actions/checkout@v4

      - name: Compiling voucher
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Uploading voucher
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: main.pdf

      - name: Checking out website repo
        uses: actions/checkout@v4
        with:
          repository: natestemen/nates.place
          ssh-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Downloading voucher
        uses: actions/download-artifact@v4.1.7
        with:
          name: cv-pdf

      - name: Pushing voucher to website
        run: |
          git config user.name 'carrier pigeon'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          mv main.pdf public/static/cv.pdf
          git add public/static/cv.pdf
          git commit -m "resume delivery"
          git push
